spring.application.name=lovelin
server.port=3000
server.address=127.0.0.1

spring.datasource.url=jdbc:mysql://localhost:3306/lovelin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=lovelin
spring.datasource.password=lovelin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

spring.config.import=optional:file:./local.properties

app.wechat.appid=
app.wechat.secret=
app.photo.page-size=30
app.photo.max-page-size=80
app.upload.max-upload-mb=10
app.upload.dir=uploads
app.cors-origin=
app.log.dir=logs
app.log.retention-days=14

logging.level.root=INFO
logging.level.com.lovelin=INFO
